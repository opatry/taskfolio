on:
  workflow_call:
    secrets:
      PLAYSTORE_SECRET_PASSPHRASE:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      KEYSTORE_KEY_PASSWORD:
        required: true

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 📱 Android App
            gradle_module: tasks-app-android
          - name: 🖥️ Desktop App
            gradle_module: tasks-app-desktop
          - name: 🍎 iOS App
            gradle_module: tasks-app-ios
    permissions:
        contents: write
        checks: write
        id-token: write
        pull-requests: write

    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/setup-jdk-gradle

    - name: 🔓 Decrypt secrets
      env:
        PLAYSTORE_SECRET_PASSPHRASE: ${{ secrets.PLAYSTORE_SECRET_PASSPHRASE }}
      run: ./_ci/decrypt_secrets.sh

    - name: ${{ matrix.name }}
      env:
        PLAYSTORE_SECRET_PASSPHRASE: ${{ secrets.PLAYSTORE_SECRET_PASSPHRASE }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
      run: |
        gradle_module="${{ matrix.gradle_module }}"
        if [ "${gradle_module}" = "tasks-app-desktop" ]; then
          ./gradlew --no-daemon --parallel ":${gradle_module}:assemble"
        elif [ "${gradle_module}" = "tasks-app-android" ]; then
          ./gradlew --no-daemon --parallel :tasks-app-android:assembleStoreRelease \
            -Pci=true \
            -Pplaystore.keystore.file="${PWD}/_ci/tasksApp.keystore" \
            -Pplaystore.keystore.password="${KEYSTORE_PASSWORD}" \
            -Pplaystore.keystore.key_password="${KEYSTORE_KEY_PASSWORD}"
        elif [ "${gradle_module}" = "tasks-app-ios" ]; then
          ./gradlew --no-daemon --parallel :tasks-app-shared:embedAndSignAppleFrameworkForXcode
        fi
# TODO
# 1 matrix per iOS target or just build for sim and that's it?
# anyway, need to inject desired list of iOS targets to build and adjust gradle task to invoke accordingly
# TODO launch iOS app build using xcodebuild (embedAndSignAppleFrameworkForXcode shouldn't be needed then, handled directly by xcodebuild)
